name: Prueba de Compilación y Release Completo

on:
  push:
    tags:
      - 'v*' # Se dispara solo cuando subes un tag como v1.0.0

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. Clonar repositorio
      uses: actions/checkout@v4

    # --- CONFIGURAR Y COMPILAR REACT ---
    - name: 2.a Configurar Node.js (Para React)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 2.b Instalar dependencias y compilar React
      run: |
        cd client-react
        npm install
        npm run build
        # Esto creará la carpeta 'dist' en tiempo de ejecución dentro de la nube

    # --- CONFIGURAR PYTHON ---
    - name: 3. Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 4. Instalar dependencias de Python
      run: |
        python -m pip install --upgrade pip
        if (Test-Path "server-flask/requirements.txt") {
          pip install -r server-flask/requirements.txt
        }
        pip install pyinstaller

    # --- INYECTAR VERSIÓN DEL TAG EN LA APP ---
    - name: 5.a Generar version.txt desde el tag
      run: |
        $version = "${{ github.ref_name }}".TrimStart('v')
        Set-Content -Path "server-flask/version.txt" -Value $version -NoNewline
        Write-Output "version.txt generado con la versión: $version"

    - name: 5.b Compilar ejecutable con PyInstaller
      run: |
        cd server-flask
        
        $PLAYWRIGHT_DIR = python -c "import os, playwright; print(os.path.dirname(playwright.__file__))"
        echo "La ruta dinámica de Playwright es: $PLAYWRIGHT_DIR"

        pyinstaller --clean --name "SaludsaActas" --noconfirm --onedir -w `
          --add-data "../client-react/dist;dist" `
          --add-data "src/templates;src/templates" `
          --add-data "version.txt;." `
          --add-data "$PLAYWRIGHT_DIR\driver;playwright\driver" `
          --hidden-import win32com `
          --hidden-import pythoncom `
          --hidden-import docxtpl `
          --hidden-import playwright `
          main.py

    # --- COMPILAR INSTALADOR FINAL ---
    - name: 6.a Compilar Instalador con Inno Setup de forma nativa
      run: |
        $version = "${{ github.ref_name }}".TrimStart('v')
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$version saludsa.iss

    # --- GENERAR MANIFIESTO DE ACTUALIZACIÓN ---
    - name: 6.b Generar version.json (manifiesto de auto-actualización)
      run: |
        $version = "${{ github.ref_name }}".TrimStart('v')
        $sha256 = (Get-FileHash "Output/SaludsaActas_Setup.exe" -Algorithm SHA256).Hash.ToLower()
        $manifest = @{
          version      = $version
          sha256       = $sha256
          url          = "https://github.com/dekoov/Saludsa-Control-de-Actas-TI/releases/latest/download/SaludsaActas_Setup.exe"
          published_at = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
        } | ConvertTo-Json
        Set-Content -Path "Output/version.json" -Value $manifest
        Write-Output "Manifiesto generado:"
        Write-Output $manifest

    # --- PUBLICAR EN GITHUB ---
    - name: 7. Crear Release Oficial en GitHub
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Saludsa Actas ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: |
          Output/SaludsaActas_Setup.exe
          Output/version.json
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
